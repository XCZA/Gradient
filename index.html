  return { width, height: width * (2 / 3) };
}

function gradientPreviewSnapSpots() {
  const normal = gradientPreviewSize(false);
  const tab = gradientPreviewSize(true);
  const margin = 12;
  const top = Math.max(54, Math.min(86, window.innerHeight * 0.11));
  const bottom = Math.max(top, window.innerHeight - normal.height - margin);
  const left = margin;
  const right = window.innerWidth - normal.width - margin;
  const centerY = (window.innerHeight - normal.height) / 2;
  return {
    'top-left': { x: left, y: top, minimized: false, edge: 'left' },
    'top-right': { x: right, y: top, minimized: false, edge: 'right' },
    'bottom-left': { x: left, y: bottom, minimized: false, edge: 'left' },
    'bottom-right': { x: right, y: bottom, minimized: false, edge: 'right' },
    'left': { x: -6, y: (window.innerHeight - tab.height) / 2, minimized: true, edge: 'left' },
    'right': { x: window.innerWidth - tab.width + 6, y: (window.innerHeight - tab.height) / 2, minimized: true, edge: 'right' },
  };

function clampGradientPreviewPosition(x, y, width, height) {
  return {
    x: Math.min(Math.max(-8, x), Math.max(-8, window.innerWidth - width + 8)),
    y: Math.min(Math.max(8, y), Math.max(8, window.innerHeight - height - 8)),
  };
}

function nearestGradientPreviewSpot(x, y, width, height) {
  const cx = x + width / 2;
  const cy = y + height / 2;
  const spots = gradientPreviewSnapSpots();
  let best = 'top-right';
  let bestDist = Infinity;
  Object.entries(spots).forEach(([name, spot]) => {
    const size = gradientPreviewSize(spot.minimized);
    const sx = spot.x + size.width / 2;
    const sy = spot.y + size.height / 2;
    const dist = Math.hypot(cx - sx, cy - sy);
    if (dist < bestDist) {
      best = name;
      bestDist = dist;
    }
  });
  return best;
}

function applyGradientPreviewSpot(spotName) {

  const spots = gradientPreviewSnapSpots();
  const spot = spots[spotName] || spots['top-right'];

  state.minimized = !!spot.minimized;

    const spots = gradientPreviewSnapSpots();
    const spot = spots[state.spot] || spots['top-right'];

    state.y = spot.y;
    state.edge = spot.edge;

  const mobile = __gradientPreviewMedia.matches;

  wrap.classList.toggle('is-floating', floating);

  if (action) {

      action.setAttribute('aria-label', 'Pop out gradient preview');

function setGradientPreviewFloating(nextFloating) {

function toggleGradientPreviewMinimized() {

  state.suppressClick = true;

    const normalSpot = state.edge === 'left'
      ? (state.y > window.innerHeight / 2 ? 'bottom-left' : 'top-left')
      : (state.y > window.innerHeight / 2 ? 'bottom-right' : 'top-right');
    const spot = spots[normalSpot];
    state.spot = normalSpot;
    state.minimized = false;
    state.edge = spot.edge;
    state.x = spot.x;
    state.y = Math.min(Math.max(spot.y, 54), window.innerHeight - gradientPreviewSize(false).height - 12);

    const spotName = state.edge === 'left' || state.x < window.innerWidth / 2 ? 'left' : 'right';

  showGradientPreviewChrome(2000);

function onGradientPreviewPointerDown(ev) {

  if (!wrap) return;
  const state = ensureGradientPreviewState();
  if (!(__gradientPreviewMedia.matches && state.floating)) return;
  if (ev.target.closest('[data-gradient-preview-action]')) return;
  const rect = wrap.getBoundingClientRect();
  __gradientPreviewDrag = {
    pointerId: ev.pointerId,
    startX: ev.clientX,
    startY: ev.clientY,
    originX: rect.left,
    originY: rect.top,

  };

  wrap.classList.remove('is-minimized');
  wrap.classList.add('dragging');

  const currentSize = gradientPreviewSize(false);
  const spotName = nearestGradientPreviewSpot(state.x, state.y, currentSize.width, currentSize.height);

function nearestGradientPreviewSpot(x, y, width, height, drag = null) {
  const cx = x + width / 2;
  const cy = y + height / 2;

    const dt = Math.max(16, performance.now() - (drag.lastT || drag.startT || performance.now()));
    const vx = ((drag.lastX ?? drag.startX) - drag.startX) / dt;
    const vy = ((drag.lastY ?? drag.startY) - drag.startY) / dt;
    const speed = Math.hypot(vx, vy);
    if (speed > 0.75) {
      const right = Math.abs(vx) > Math.abs(vy) * 0.65 ? vx > 0 : cx > window.innerWidth / 2;
      const bottom = Math.abs(vy) > Math.abs(vx) * 0.65 ? vy > 0 : cy > window.innerHeight / 2;
      return `${bottom ? 'bottom' : 'top'}-${right ? 'right' : 'left'}`;
    }
  }
  return `${cy > window.innerHeight / 2 ? 'bottom' : 'top'}-${cx > window.innerWidth / 2 ? 'right' : 'left'}`;

      applyGradientPreviewFloatPosition();
      syncGradientPreviewActions();

    drag.tentativeEdge = edge;
    state.minimized = true;
    state.spot = edge;
    state.edge = edge;
    state.x = edge === 'left' ? 0 : window.innerWidth - tabSize.width;
    state.y = Math.min(Math.max(8, ev.clientY - tabSize.height / 2), window.innerHeight - tabSize.height - 8);

    applyGradientPreviewFloatPosition();
    syncGradientPreviewActions();
    return;
  }

    const edge = drag.tentativeEdge || state.edge || 'right';
    state.minimized = true;
    state.spot = edge;
    state.edge = edge;
    state.x = edge === 'left' ? 0 : window.innerWidth - tabSize.width;

    drag.tentativeEdge = null;
    wrap.classList.remove('tentative-edge');

  state.minimized = false;
  state.x = Math.min(Math.max(-(normalSize.width * 0.55), rawX), window.innerWidth - normalSize.width + (normalSize.width * 0.55));
  state.y = Math.min(Math.max(8, rawY), window.innerHeight - normalSize.height - 8);

let __gradientPreviewPointers = new Map();
let __gradientPreviewPinch = null;

function gradientPreviewDefaultWidth() {
  return Math.min(window.innerWidth * 0.46, 204);
}

function gradientPreviewMaxWidth() {
  return Math.max(gradientPreviewDefaultWidth(), window.innerWidth * 0.92);
}

function gradientPreviewSize(minimized = false) {
  if (minimized) return { width: 34, height: 112 };
  const state = ensureGradientPreviewState();
  const width = Math.min(
    Math.max(Number(state.previewWidth) || gradientPreviewDefaultWidth(), gradientPreviewDefaultWidth()),
    gradientPreviewMaxWidth()
  );
  return { width, height: width * (2 / 3) };
}

function distanceBetweenPoints(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function centerBetweenPoints(a, b) {
  return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
}

function beginGradientPreviewPinch() {
  const wrap = document.getElementById('gradientPreviewWrap');
  const state = ensureGradientPreviewState();
  if (!wrap || !state.floating || state.minimized || __gradientPreviewPointers.size < 2) return;

  const points = Array.from(__gradientPreviewPointers.values()).slice(-2);
  const startDistance = Math.max(1, distanceBetweenPoints(points[0], points[1]));
  const center = centerBetweenPoints(points[0], points[1]);
  const size = gradientPreviewSize(false);
  const rect = wrap.getBoundingClientRect();

  __gradientPreviewPinch = {
    pointerIds: points.map(p => p.id),
    startDistance,
    startWidth: size.width,
    centerOffsetX: center.x - rect.left,
    centerOffsetY: center.y - rect.top,
  };

  __gradientPreviewDrag = null;
  wrap.classList.add('is-pinching');
  showGradientPreviewChrome(3000);
}

function updateGradientPreviewPinch() {
  const wrap = document.getElementById('gradientPreviewWrap');
  const state = ensureGradientPreviewState();
  if (!wrap || !__gradientPreviewPinch || !state.floating) return;

  const [idA, idB] = __gradientPreviewPinch.pointerIds;
  const a = __gradientPreviewPointers.get(idA);
  const b = __gradientPreviewPointers.get(idB);
  if (!a || !b) return;

  const currentDistance = Math.max(1, distanceBetweenPoints(a, b));
  const scale = currentDistance / __gradientPreviewPinch.startDistance;
  const minWidth = gradientPreviewDefaultWidth();
  const maxWidth = gradientPreviewMaxWidth();
  const nextWidth = Math.min(Math.max(__gradientPreviewPinch.startWidth * scale, minWidth), maxWidth);
  const nextHeight = nextWidth * (2 / 3);
  const center = centerBetweenPoints(a, b);

  state.previewWidth = nextWidth;
  state.minimized = false;
  state.spot = 'floating';
  state.x = center.x - (nextWidth * (__gradientPreviewPinch.centerOffsetX / __gradientPreviewPinch.startWidth));
  state.y = center.y - (nextHeight * (__gradientPreviewPinch.centerOffsetY / (__gradientPreviewPinch.startWidth * (2 / 3))));

  state.x = Math.min(Math.max(8, state.x), Math.max(8, window.innerWidth - nextWidth - 8));
  state.y = Math.min(Math.max(8, state.y), Math.max(8, window.innerHeight - nextHeight - 8));

const __originalFinalPointerMoveForPinch = updateGradientPreviewDragState;
updateGradientPreviewDragState = function(ev) {

    centerRatioY: (center.y - rect.top) / Math.max(1, startHeight),
  };

  __gradientPreviewPinch = null;
  __gradientPreviewDrag = null;
  wrap.classList.add('is-pinching');
  showGradientPreviewChrome(3000);
  return true;
}

function updateGradientPreviewTouchPinch(ev) {
  const wrap = document.getElementById('gradientPreviewWrap');
  const state = ensureGradientPreviewState();
  const pts = getFirstTwoTouches(ev);
  if (!wrap || !__gradientTouchPinch || !pts || !state.floating || state.minimized) return false;

  ev.preventDefault();
  ev.stopPropagation();

  const currentDistance = Math.max(1, distanceBetweenPoints(pts[0], pts[1]));
  const scale = currentDistance / __gradientTouchPinch.startDistance;
  const minWidth = gradientPreviewDefaultWidth();
  const maxWidth = gradientPreviewMaxWidth();
  const nextWidth = Math.min(Math.max(__gradientTouchPinch.startWidth * scale, minWidth), maxWidth);
  const nextHeight = nextWidth * (2 / 3);
  const center = centerBetweenPoints(pts[0], pts[1]);

  state.previewWidth = nextWidth;
  state.minimized = false;
  state.spot = 'floating';
  state.x = center.x - nextWidth * __gradientTouchPinch.centerRatioX;
  state.y = center.y - nextHeight * __gradientTouchPinch.centerRatioY;

  state.x = Math.min(Math.max(8, state.x), Math.max(8, window.innerWidth - nextWidth - 8));
  state.y = Math.min(Math.max(8, state.y), Math.max(8, window.innerHeight - nextHeight - 8));

  applyGradientPreviewFloatPosition();
  return true;
}

function endGradientPreviewTouchPinch() {
  const wrap = document.getElementById('gradientPreviewWrap');
  if (!__gradientTouchPinch) return;
  __gradientTouchPinch = null;
  wrap?.classList.remove('is-pinching');
  showGradientPreviewChrome(1800);
}

function setupGradientPreviewTouchPinch() {
  const wrap = document.getElementById('gradientPreviewWrap');
  if (!wrap || wrap.dataset.touchPinchBound === 'true') return;
  wrap.dataset.touchPinchBound = 'true';

  wrap.addEventListener('touchstart', ev => {
    if (ev.touches && ev.touches.length >= 2) {
      beginGradientPreviewTouchPinch(ev);
    }
  }, { passive: false, capture: true });

  wrap.addEventListener('touchmove', ev => {
    if (__gradientTouchPinch) {
      updateGradientPreviewTouchPinch(ev);
    } else if (ev.touches && ev.touches.length >= 2) {
      beginGradientPreviewTouchPinch(ev);
    }
  }, { passive: false, capture: true });

  wrap.addEventListener('touchend', ev => {
    if (!ev.touches || ev.touches.length < 2) endGradientPreviewTouchPinch();
  }, { passive: false, capture: true });

  wrap.addEventListener('touchcancel', () => {
    endGradientPreviewTouchPinch();
  }, { passive: false, capture: true });
}

const __originalEnsureGradientPreviewActionsForTouchPinch = ensureGradientPreviewActions;
ensureGradientPreviewActions = function(...args) {
  const result = __originalEnsureGradientPreviewActionsForTouchPinch.apply(this, args);
  setupGradientPreviewTouchPinch();
  return result;
};


// Preserve floating preview scale across non-pinch interactions.
function preserveGradientPreviewScale() {
  const state = ensureGradientPreviewState();
  if (!Number.isFinite(Number(state.previewWidth))) {
    state.previewWidth = gradientPreviewDefaultWidth();
  } else {
    state.previewWidth = Math.min(Math.max(Number(state.previewWidth), gradientPreviewDefaultWidth()), gradientPreviewMaxWidth());
  }
}
const __originalSyncGradientPreviewActionsPreserveScale = syncGradientPreviewActions;
syncGradientPreviewActions = function(...args) {
  preserveGradientPreviewScale();
  return __originalSyncGradientPreviewActionsPreserveScale.apply(this, args);
};

ensureGradientState();
setupGradientPanelEvents();
rebuildUI();
updateGradientPanel();
</script>


<script id="chromatune-segment-lens-patch">
(() => {
  const TOGGLE_SELECTOR = '#modeToggle, #gradientTypeToggle, #gradientShapeToggle';
  const FILTER_ID = 'chromatuneSegmentLensFilter';
  const FILTER_IMAGE_ID = 'chromatuneSegmentLensDisplacementImage';
  const FILTER_MAP_ID = 'chromatuneSegmentLensDisplacementMap';

  class LensSpring {
    constructor(value, stiffness = 420, damping = 30) {
      this.value = value;
      this.target = value;
      this.velocity = 0;
      this.stiffness = stiffness;
      this.damping = damping;
    }
    setTarget(target) { this.target = target; }
    update(dt) {
      const force = (this.target - this.value) * this.stiffness;
      const dampingForce = this.velocity * this.damping;
      this.velocity += (force - dampingForce) * dt;
      this.value += this.velocity * dt;
      return this.value;
    }
    isSettled() {
      return Math.abs(this.target - this.value) < 0.001 && Math.abs(this.velocity) < 0.001;
    }
  }

  const lensSprings = new WeakMap();
  let activeDrag = null;
  let raf = null;
  let suppressClickUntil = 0;
  let internalActivation = false;
  let maxDisp = 0;

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function convexSquircle(x) {
    return Math.pow(1 - Math.pow(1 - x, 4), 1 / 4);
  }

  function calculateDisplacementMap1D(glassThickness, bezelWidth, refractiveIndex, samples = 128) {
    const eta = 1 / refractiveIndex;
    const result = [];
    for (let i = 0; i < samples; i++) {
      const x = i / samples;
      const y = convexSquircle(x);
      const dx = x < 1 ? 0.0001 : -0.0001;
      const derivative = (convexSquircle(Math.max(0, Math.min(1, x + dx))) - y) / dx;
      const mag = Math.sqrt(derivative * derivative + 1);
      const normal = [-derivative / mag, -1 / mag];
      const dot = normal[1];
      const k = 1 - eta * eta * (1 - dot * dot);
      if (k < 0) result.push(0);
      else {
        const refracted = [
          -(eta * dot + Math.sqrt(k)) * normal[0],
          eta - (eta * dot + Math.sqrt(k)) * normal[1]
        ];
        result.push(refracted[0] * ((y * bezelWidth + glassThickness) / refracted[1]));
      }
    }
    return result;
  }

  function calculateDisplacementMap2D(width, height, radius, bezelWidth, maxDisplacement, precomputedMap) {
    const image = new ImageData(width, height);
    for (let i = 0; i < image.data.length; i += 4) {
      image.data[i] = 128;
      image.data[i + 1] = 128;
      image.data[i + 2] = 128;
      image.data[i + 3] = 255;
    }

    const radiusSq = radius * radius;
    const radiusPlusSq = (radius + 1) ** 2;
    const radiusMinusBezelSq = Math.max(0, radius - bezelWidth) ** 2;
    const widthBetween = width - radius * 2;
    const heightBetween = height - radius * 2;

    for (let y1 = 0; y1 < height; y1++) {
      for (let x1 = 0; x1 < width; x1++) {
        const index = (y1 * width + x1) * 4;
        const x = x1 < radius ? x1 - radius : x1 >= width - radius ? x1 - radius - widthBetween : 0;
        const y = y1 < radius ? y1 - radius : y1 >= height - radius ? y1 - radius - heightBetween : 0;
        const distSq = x * x + y * y;

        if (distSq <= radiusPlusSq && distSq >= radiusMinusBezelSq) {
          const dist = Math.sqrt(distSq);
          const outerOpacity = distSq < radiusSq ? 1 : 1 - (dist - radius) / (Math.sqrt(radiusPlusSq) - radius);
          const bezelIndex = Math.floor(clamp((radius - dist) / bezelWidth, 0, 1) * precomputedMap.length);
          const displacement = precomputedMap[Math.max(0, Math.min(bezelIndex, precomputedMap.length - 1))] || 0;
          const dx = maxDisplacement > 0 ? (-(dist > 0 ? x / dist : 0) * displacement) / maxDisplacement : 0;
          const dy = maxDisplacement > 0 ? (-(dist > 0 ? y / dist : 0) * displacement) / maxDisplacement : 0;
          image.data[index] = clamp(Math.round(128 + dx * 127 * outerOpacity), 0, 255);
          image.data[index + 1] = clamp(Math.round(128 + dy * 127 * outerOpacity), 0, 255);
        }
      }
    }
    return image;
  }

  function imageDataToDataURL(imageData) {
    const canvas = document.createElement('canvas');
    canvas.width = imageData.width;
    canvas.height = imageData.height;
    canvas.getContext('2d').putImageData(imageData, 0, 0);
    return canvas.toDataURL();
  }

  function ensureLensFilter() {
    if (document.getElementById(FILTER_ID)) return;

    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('aria-hidden', 'true');
    svg.setAttribute('width', '0');
    svg.setAttribute('height', '0');
    svg.style.position = 'absolute';
    svg.style.pointerEvents = 'none';
    svg.innerHTML = `
      <defs>
        <filter id="${FILTER_ID}" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
          <feGaussianBlur in="SourceGraphic" stdDeviation="0.20" result="blurred"></feGaussianBlur>
          <feImage id="${FILTER_IMAGE_ID}" href="" x="0" y="0" width="112" height="30" result="displacement_map" preserveAspectRatio="none"></feImage>
          <feDisplacementMap id="${FILTER_MAP_ID}" in="blurred" in2="displacement_map" scale="16" xChannelSelector="R" yChannelSelector="G" result="displaced"></feDisplacementMap>
          <feColorMatrix in="displaced" type="saturate" values="1.08"></feColorMatrix>
        </filter>
      </defs>
    `;
    document.body.prepend(svg);

    const height = 30;
    const width = 140;
    const bezelWidth = 9;
    const glassThickness = 42;
    const refractiveIndex = 1.6;
    const oneD = calculateDisplacementMap1D(glassThickness, bezelWidth, refractiveIndex);
    maxDisp = Math.max(...oneD.map(Math.abs));
    const map = calculateDisplacementMap2D(width, height, height / 2, bezelWidth, maxDisp || 1, oneD);
    const image = document.getElementById(FILTER_IMAGE_ID);
    image.setAttribute('width', String(width));
    image.setAttribute('height', String(height));
    image.setAttribute('href', imageDataToDataURL(map));
  }

  function getButtons(toggleEl) {
    if (!toggleEl) return [];
    if (toggleEl.id === 'modeToggle') return Array.from(toggleEl.querySelectorAll('.mode-btn'));
    if (toggleEl.id === 'gradientTypeToggle') return Array.from(toggleEl.querySelectorAll('.gradient-type-btn'));
    if (toggleEl.id === 'gradientShapeToggle') return Array.from(toggleEl.querySelectorAll('.gradient-shape-btn'));
    return [];
  }

  function ensureIndicator(toggleEl) {
    if (!toggleEl) return null;
    let indicator = toggleEl.querySelector(':scope > .segmented-indicator');
    if (!indicator) {
      indicator = document.createElement('div');
      indicator.className = 'segmented-indicator';
      toggleEl.insertBefore(indicator, toggleEl.firstChild);
    }
    return indicator;
  }

  function getToggleMetrics(toggleEl) {
    const buttons = getButtons(toggleEl);
    const pad = parseFloat(getComputedStyle(toggleEl).getPropertyValue('--segment-pad')) || 4;
    const total = Math.max(0, toggleEl.clientWidth - pad * 2);
    const width = buttons.length ? total / buttons.length : 0;
    return { buttons, pad, width, maxX: Math.max(0, total - width) };
  }

  function getSprings(toggleEl) {
    let springs = lensSprings.get(toggleEl);
    if (!springs) {
      springs = {
        x: new LensSpring(0),
        scaleX: new LensSpring(1, 340, 24),
        scaleY: new LensSpring(1, 340, 24)
      };
      lensSprings.set(toggleEl, springs);
    }
    return springs;
  }

  function activeIndex(toggleEl) {
    const buttons = getButtons(toggleEl);
    return Math.max(0, buttons.findIndex(btn => btn.classList.contains('active')));
  }

  function previewIndex(toggleEl, index) {
    const buttons = getButtons(toggleEl);
    buttons.forEach((btn, i) => btn.classList.toggle('segment-lens-preview', i === index && !btn.classList.contains('active')));
  }

  function clearPreview(toggleEl) {
    getButtons(toggleEl).forEach(btn => btn.classList.remove('segment-lens-preview'));
  }

  function setToggleLensPosition(toggleEl, x, immediate = false) {
    const indicator = ensureIndicator(toggleEl);
    if (!indicator) return;
    toggleEl.style.setProperty('--segment-indicator-x', `${x}px`);
    if (immediate) {
      indicator.style.transition = 'none';
      requestAnimationFrame(() => { indicator.style.transition = ''; });
    }
  }

  function updateLensToggle(toggleEl, opts = {}) {
    if (!toggleEl) return;
    ensureLensFilter();
    const indicator = ensureIndicator(toggleEl);
    const { buttons, width } = getToggleMetrics(toggleEl);
    if (!indicator || !buttons.length || !width) return;

    const idx = activeIndex(toggleEl);
    toggleEl.style.setProperty('--segment-indicator-w', `${width}px`);
    indicator.style.width = `${width}px`;
    indicator.style.opacity = '1';

    if (opts.keepDrag && activeDrag?.toggleEl === toggleEl) return;

    const springs = getSprings(toggleEl);
    springs.x.value = springs.x.target = idx * width;
    springs.scaleX.value = springs.scaleX.target = 1;
    springs.scaleY.value = springs.scaleY.target = 1;
    toggleEl.style.setProperty('--segment-scale-x', '1');
    toggleEl.style.setProperty('--segment-scale-y', '1');
    setToggleLensPosition(toggleEl, idx * width);
    clearPreview(toggleEl);
  }

  function updateAllLensToggles(opts = {}) {
    document.querySelectorAll(TOGGLE_SELECTOR).forEach(toggleEl => updateLensToggle(toggleEl, opts));
  }

  const originalUpdateSegmentedToggleIndicators = window.updateSegmentedToggleIndicators;
  window.updateSegmentedToggleIndicators = function chromatuneSegmentLensUpdate() {
    if (typeof originalUpdateSegmentedToggleIndicators === 'function') {
      originalUpdateSegmentedToggleIndicators();
    }
    updateAllLensToggles({ keepDrag: true });
  };
  try { updateSegmentedToggleIndicators = window.updateSegmentedToggleIndicators; } catch {}

  function applySpringFrame(toggleEl) {
    const springs = getSprings(toggleEl);
    springs.x.update(Math.min(0.032, 1 / 60));
    springs.scaleX.update(Math.min(0.032, 1 / 60));
    springs.scaleY.update(Math.min(0.032, 1 / 60));

    toggleEl.style.setProperty('--segment-indicator-x', `${springs.x.value}px`);
    toggleEl.style.setProperty('--segment-scale-x', String(springs.scaleX.value));
    toggleEl.style.setProperty('--segment-scale-y', String(springs.scaleY.value));

    const stretchBoost = Math.abs(springs.scaleX.value - 1) * 6;
    const dragBoost = activeDrag?.toggleEl === toggleEl ? 0.52 : 0;
    const map = document.getElementById(FILTER_MAP_ID);
    if (map) map.setAttribute('scale', (maxDisp * (0.72 + stretchBoost + dragBoost * 0.72)).toFixed(3));
  }

  function loop() {
    raf = null;
    const toggles = Array.from(document.querySelectorAll(TOGGLE_SELECTOR));
    let needsMore = false;

    toggles.forEach(toggleEl => {
      const springs = getSprings(toggleEl);
      const dragging = activeDrag?.toggleEl === toggleEl && activeDrag.dragging;
      const stretch = dragging ? clamp(Math.abs(activeDrag.velocityX) / 760, 0, 0.10) : 0;
      springs.scaleX.setTarget(dragging ? 1.02 + stretch : 1);
      springs.scaleY.setTarget(dragging ? 0.985 - stretch * 0.3 : 1);
      applySpringFrame(toggleEl);
      if (!Object.values(springs).every(spring => spring.isSettled())) needsMore = true;
    });

    if (needsMore) raf = requestAnimationFrame(loop);
  }

  function startLoop() {
    if (!raf) raf = requestAnimationFrame(loop);
  }

  function nearestIndex(toggleEl, x) {
    const { buttons, width } = getToggleMetrics(toggleEl);
    if (!buttons.length || !width) return 0;
    return clamp(Math.round(x / width), 0, buttons.length - 1);
  }

  function indexFromPointer(toggleEl, clientX) {
    const { buttons, pad, width } = getToggleMetrics(toggleEl);
    if (!buttons.length || !width) return 0;
    const rect = toggleEl.getBoundingClientRect();
    return clamp(Math.floor((clientX - rect.left - pad) / width), 0, buttons.length - 1);
  }

  function activateSegmentButton(toggleEl, index) {
    const buttons = getButtons(toggleEl);
    const button = buttons[index];
    if (!button) return;
    internalActivation = true;
    button.click();
    internalActivation = false;
  }

  function xFromPointer(drag, clientX) {
    const rect = drag.toggleEl.getBoundingClientRect();
    const { pad, maxX } = getToggleMetrics(drag.toggleEl);
    return clamp(clientX - rect.left - pad - drag.grabOffset, 0, maxX);
  }

  document.addEventListener('pointerdown', ev => {
    if (ev.button != null && ev.button !== 0) return;
    const toggleEl = ev.target.closest?.(TOGGLE_SELECTOR);
    if (!toggleEl) return;

    ensureLensFilter();
    updateLensToggle(toggleEl);
    const { pad, width } = getToggleMetrics(toggleEl);
    if (!width) return;

    ev.preventDefault();

    const springs = getSprings(toggleEl);
    const rect = toggleEl.getBoundingClientRect();
    const pointerX = ev.clientX - rect.left - pad;
    const currentX = springs.x.target;
    const withinKnob = pointerX >= currentX && pointerX <= currentX + width;

    activeDrag = {
      toggleEl,
      pointerId: ev.pointerId,
      startX: ev.clientX,
      lastX: ev.clientX,
      velocityX: 0,
      dragging: false,
      grabOffset: withinKnob ? pointerX - currentX : width / 2
    };

    toggleEl.classList.add('segment-lens-pressed');
    try { toggleEl.setPointerCapture(ev.pointerId); } catch {}
    startLoop();
  }, true);

  document.addEventListener('pointermove', ev => {
    if (!activeDrag || ev.pointerId !== activeDrag.pointerId) return;
    const moved = Math.abs(ev.clientX - activeDrag.startX);
    if (!activeDrag.dragging && moved < 3) return;

    if (!activeDrag.dragging) {
      activeDrag.dragging = true;
      activeDrag.toggleEl.classList.add('segment-lens-dragging');
    }

    ev.preventDefault();
    const nextX = xFromPointer(activeDrag, ev.clientX);
    const springs = getSprings(activeDrag.toggleEl);
    springs.x.setTarget(nextX);
    activeDrag.velocityX = ev.clientX - activeDrag.lastX;
    activeDrag.lastX = ev.clientX;
    previewIndex(activeDrag.toggleEl, nearestIndex(activeDrag.toggleEl, nextX));
    startLoop();
  }, { capture: true, passive: false });

  function finishDrag(ev) {
    if (!activeDrag || ev.pointerId !== activeDrag.pointerId) return;
    const drag = activeDrag;
    activeDrag = null;
    drag.toggleEl.classList.remove('segment-lens-pressed', 'segment-lens-dragging');
    clearPreview(drag.toggleEl);

    ev.preventDefault();
    suppressClickUntil = Date.now() + 350;

    const springs = getSprings(drag.toggleEl);
    const index = drag.dragging
      ? nearestIndex(drag.toggleEl, springs.x.target)
      : indexFromPointer(drag.toggleEl, ev.clientX);

    activateSegmentButton(drag.toggleEl, index);
    springs.x.setTarget(index * getToggleMetrics(drag.toggleEl).width);

    requestAnimationFrame(() => {
      updateLensToggle(drag.toggleEl);
      startLoop();
    });
  }

  document.addEventListener('pointerup', finishDrag, true);
  document.addEventListener('pointercancel', finishDrag, true);

  document.addEventListener('click', ev => {
    if (internalActivation) return;
    const toggleEl = ev.target.closest?.(TOGGLE_SELECTOR);
    if (!toggleEl) return;

    if (Date.now() < suppressClickUntil) {
      ev.preventDefault();
      ev.stopImmediatePropagation();
      return;
    }

    requestAnimationFrame(() => {
      updateLensToggle(toggleEl);
      startLoop();
    });
  }, true);

  function mutationTouchesLensToggle(mutation) {
    const target = mutation.target;
    return target instanceof Element && !!target.closest(TOGGLE_SELECTOR);
  }

  let observerRaf = 0;
  const observer = new MutationObserver(mutations => {
    if (!mutations.some(mutationTouchesLensToggle)) return;
    if (observerRaf) return;
    observerRaf = requestAnimationFrame(() => {
      observerRaf = 0;
      updateAllLensToggles({ keepDrag: true });
    });
  });
  observer.observe(document.documentElement, { subtree: true, attributes: true, attributeFilter: ['class'] });

  window.addEventListener('resize', () => requestAnimationFrame(updateAllLensToggles));

  requestAnimationFrame(() => {
    ensureLensFilter();
    updateAllLensToggles();
    startLoop();
  });
})();
</script>
